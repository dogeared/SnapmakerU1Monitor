# The app will attempt to get this information from your printer, but you can set it directly here if you want
#printer.name=Snapmaker
#printer.model=U1

printer.host=192.168.68.105
printer.port=7125
printer.domain=lan
printer.monitor-interval=0

printer.refresh-interval-ms=100
printer.start-cooldown-seconds=5
printer.idle-stop-seconds=60
printer.stats-interval-ms=10000
printer.continue-prompt-ms=30000

# DANGER
# Set this to false if you want to have no security on the app.
# You probably shouldn't do this.
# DANGER
global.security.enabled=true

# OIDC — set via env vars or override in application-local.properties
# This is set up for authorization code flow with PKCE
spring.security.oauth2.client.registration.oidc-provider.client-id=${OIDC_CLIENT_ID}
spring.security.oauth2.client.registration.oidc-provider.client-authentication-method=none
spring.security.oauth2.client.registration.oidc-provider.scope=openid,profile,email
spring.security.oauth2.client.registration.oidc-provider.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.oidc-provider.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.oidc-provider.issuer-uri=${OIDC_ISSUER_URI}
